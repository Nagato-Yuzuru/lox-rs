# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  path_filters:
    - "!target/**"
    - "!Cargo.lock"
    - "!tests/snapshots/**"

  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        - This is a Rust implementation of the Lox language from "Crafting Interpreters".
        - Prefer idiomatic Rust: pattern matching, iterators, `?` for error propagation.
        - Flag silent error suppression: `unwrap_or_default`, swallowed `Result`s, `let _ =` without justification.
        - Half-finished chapters with `todo!()` / `unimplemented!()` are expected — do not flag those unless adjacent logic is broken.
        - Do not suggest adding doc comments on private items unless behavior is non-obvious.
    - path: "tests/**/*.rs"
      instructions: |
        - Integration tests use `insta::glob!` for snapshot testing against `.lox` files.
        - Do not suggest replacing snapshot assertions with hand-written ones.
    - path: "tests/cases/**/*.lox"
      instructions: |
        - These are Lox source files used as snapshot test inputs. Review for clarity of what is being tested, not Rust style.

  tools:
    clippy:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true

chat:
  auto_reply: true
