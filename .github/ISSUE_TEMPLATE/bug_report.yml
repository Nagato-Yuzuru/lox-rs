name: Bug report
description: Something doesn't work the way the book (or common sense) says it should.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you run, what did you expect, what did you get?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: The smallest Lox snippet (or command) that triggers the bug.
      render: text
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Output of `git rev-parse HEAD`.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, `rustc --version`, anything else relevant.
